name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'apps/customer-h5/**'
      - 'apps/admin-web/**'
      - 'packages/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build H5
        run: pnpm --filter @petlianbao/customer-h5 build
        env:
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
          VITE_BASE_PATH: /h5/

      - name: Build Admin
        run: pnpm --filter @petlianbao/admin-web build
        env:
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
          VITE_BASE_PATH: /admin/

      - name: Prepare Pages
        run: |
          mkdir -p dist
          mv apps/customer-h5/dist dist/h5
          mv apps/admin-web/dist dist/admin
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>宠联宝</title></head><body><h1>宠联宝</h1><ul><li><a href="/h5/">H5 预约</a></li><li><a href="/admin/">管理后台</a></li></ul></body></html>' > dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4