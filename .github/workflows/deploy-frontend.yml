name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/customer-h5/**'
      - 'apps/admin-web/**'
      - 'packages/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.0

      - name: Install dependencies
        run: pnpm install

      - name: Build H5
        run: pnpm --filter @petlianbao/customer-h5 build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_WECHAT_APP_ID: ${{ secrets.VITE_WECHAT_APP_ID }}
          VITE_WECHAT_REDIRECT_URI: ${{ secrets.VITE_WECHAT_REDIRECT_URI }}

      - name: Build Admin
        run: pnpm --filter @petlianbao/admin-web build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Prepare deployment
        run: |
          mkdir -p dist
          cp -r apps/customer-h5/dist dist/h5
          cp -r apps/admin-web/dist dist/admin
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>宠联宝</title></head><body><h1>宠联宝系统</h1><ul><li><a href="./h5/">H5 客户端</a></li><li><a href="./admin/">管理后台</a></li></ul></body></html>' > dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
