name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'packages/**'
      - 'deploy/wechat-cloud/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/petlianbao
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/wechat-cloud/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/petlianbao:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/petlianbao:buildcache,mode=max

  notify-wechat:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Notify WeChat Cloud
        run: |
          echo "✅ 后端镜像构建完成"
          echo "请前往微信云托管控制台更新服务"
          echo "镜像: ${{ secrets.DOCKERHUB_USERNAME }}/petlianbao:latest"