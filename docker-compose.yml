version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: petlianbao-mysql
    environment:
      MYSQL_ROOT_PASSWORD: petlianbao123
      MYSQL_DATABASE: petlianbao
      MYSQL_USER: petlianbao
      MYSQL_PASSWORD: petlianbao123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: petlianbao-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data: