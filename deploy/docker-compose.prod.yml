version: '3.8'

services:
  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    container_name: petlianbao-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${DB_USER:-petlianbao}
      - DATABASE_PASSWORD=${DB_PASSWORD}
      - DATABASE_NAME=${DB_NAME:-petlianbao}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - WECHAT_APP_ID=${WECHAT_APP_ID}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - petlianbao-network

  postgres:
    image: postgres:15-alpine
    container_name: petlianbao-postgres-prod
    environment:
      POSTGRES_DB: ${DB_NAME:-petlianbao}
      POSTGRES_USER: ${DB_USER:-petlianbao}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-petlianbao}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - petlianbao-network

  redis:
    image: redis:7-alpine
    container_name: petlianbao-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - petlianbao-network

  nginx:
    image: nginx:alpine
    container_name: petlianbao-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - petlianbao-network

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  petlianbao-network:
    driver: bridge
